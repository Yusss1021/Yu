<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if title %}{% print title|e %}{% else %}内网脆弱性扫描平台{% endif %}</title>
  <style>
    :root {
      --font-sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial,
        "Noto Sans", "Liberation Sans", sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
        "Courier New", monospace;
    }

    html,
    body {
      font-family: var(--font-sans);
    }

    code,
    pre,
    kbd,
    samp {
      font-family: var(--font-mono);
    }

    input,
    button,
    textarea,
    select {
      font-family: inherit;
    }
  </style>
  <link rel="stylesheet" href="{% print url_for('static', filename='style.css') %}">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="brand-title" href="{% print url_for('dashboard') %}">
        <span class="brand-dot"></span>
        <span>Intra Vuln Assessor</span>
      </a>
      <nav class="nav-links">
        <a class="nav-link" href="{% print url_for('dashboard') %}">仪表盘</a>
        <a class="nav-link" href="{% print url_for('compare_page') %}">结果对比</a>
      </nav>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="message-stack">
          {% for category, message in messages %}
            <div class="flash {% print category|e %}">{% print message|e %}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
